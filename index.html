    <!-- Estilos críticos inline para evitar FOUC -->
    <style>
      /* Reset e estilos base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        min-height: 100vh;
        background-color: #0a0a0f;
        color: #e0e0e0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
        position: relative;
      }
      
      /* Loading state inicial */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2a 100%);
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .initial-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .neural-loader {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        position: relative;
      }
      
      .neural-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #00ff88;
        border-bottom-color: #0066ff;
        animation: spin 2s linear infinite;
      }
      
      .neural-ring:nth-child(2) {
        width: 60px;
        height: 60px;
        top: 10px;
        left: 10px;
        border-top-color: #ff0066;
        border-bottom-color: #ffaa00;
        animation: spin 1.5s linear reverse infinite;
      }
      
      .neural-ring:nth-child(3) {
        width: 40px;
        height: 40px;
        top: 20px;
        left: 20px;
        border-top-color: #00ccff;
        border-bottom-color: #aa00ff;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .neural-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        color: #00ff88;
        text-transform: uppercase;
        letter-spacing: 4px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .neural-status {
        margin-top: 16px;
        font-size: 12px;
        color: #666;
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
    
    <!-- Detecção de tema escuro/claro -->
    <script>
      (function() {
        // Detectar preferência de tema do sistema
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const storedTheme = localStorage.getItem('theme');
        
        if (storedTheme === 'light' || (!storedTheme && !prefersDark)) {
          document.documentElement.classList.add('light-theme');
          document.documentElement.style.colorScheme = 'light';
        } else {
          document.documentElement.classList.add('dark-theme');
          document.documentElement.style.colorScheme = 'dark';
        }
        
        // Configurar viewport height para mobile
        const setVH = () => {
          const vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
        setVH();
      })();
    </script>

    <!-- Remover loading quando React estiver pronto -->
    <script>
      (function() {
        // Remover loading quando o React montar
        const removeLoading = () => {
          const loading = document.getElementById('initial-loading');
          if (loading) {
            loading.classList.add('fade-out');
            setTimeout(() => {
              if (loading && loading.parentNode) {
                loading.parentNode.removeChild(loading);
              }
            }, 500);
          }
        };
        
        // Atualizar status do loading
        window.updateLoadingStatus = (status) => {
          const statusEl = document.getElementById('loading-status');
          if (statusEl) {
            statusEl.textContent = status;
          }
        };
        
        // Escutar evento do React
        document.addEventListener('react-mounted', removeLoading);
        
        // Fallback: remover após 5 segundos
        setTimeout(() => {
          if (document.getElementById('initial-loading')) {
            removeLoading();
          }
        }, 5000);
      })();
    </script>
